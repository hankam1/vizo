name: Build & Release

# Triggers on a version tag (e.g. v1.2.0). Builds Windows (Nuitka) and macOS
# (PyInstaller, best-effort/unsigned) and publishes them to a GitHub Release.
#
# To ship an update:
#   1) bump VERSION in config.py
#   2) git commit + push
#   3) git tag v1.2.0 && git push origin v1.2.0
on:
  push:
    tags: ['v*']
  workflow_dispatch:        # manual "build only" (no release) for testing

permissions:
  contents: write

jobs:
  # ----------------------------------------------------------------
  # Windows — Nuitka onefile (matches the local build.bat; reliable).
  # ----------------------------------------------------------------
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build (Nuitka)
        run: |
          $ver = (python -c "import config; print(config.VERSION)").Trim()
          echo "Building vizo $ver"
          python -m nuitka `
            --standalone --onefile --windows-console-mode=disable `
            --disable-plugin=pywebview `
            --include-package=webview --include-package=clr_loader `
            --include-package=pythonnet --include-package=winotify `
            --include-package-data=webview `
            --no-deployment-flag=excluded-module-usage `
            --include-data-dir=ui=ui --include-data-dir=prompts=prompts `
            --windows-icon-from-ico=logo.ico `
            --output-filename=vizo.exe --output-dir=build-nuitka `
            --assume-yes-for-downloads `
            --company-name=hankam1 --product-name=vizo `
            --product-version=$ver --file-version=$ver `
            app.py
      - uses: actions/upload-artifact@v4
        with:
          name: vizo-windows
          path: build-nuitka/vizo.exe

  # ----------------------------------------------------------------
  # macOS — two NATIVE dmgs, both built on the arm64 runner:
  #   arm64  → native; x86_64 → via Rosetta (each leg installs its own
  #   arch-native wheels, so no universal "fat binary" requirement that
  #   thin-wheel deps like yarl break). No scarce Intel runner needed.
  #   UNSIGNED → first launch needs right-click→Open.
  # ----------------------------------------------------------------
  macos:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            label: apple-silicon
          - arch: x86_64
            label: intel
    steps:
      - uses: actions/checkout@v4
      - name: Ensure Rosetta (x86_64 leg)
        if: matrix.arch == 'x86_64'
        run: softwareupdate --install-rosetta --agree-to-license || true
      - name: Install universal2 Python (python.org)
        run: |
          curl -fsSL -o python.pkg https://www.python.org/ftp/python/3.13.1/python-3.13.1-macos11.pkg
          sudo installer -pkg python.pkg -target /
      - name: Install deps (${{ matrix.arch }})
        run: |
          PY=/Library/Frameworks/Python.framework/Versions/3.13/bin/python3.13
          arch -${{ matrix.arch }} $PY -m pip install --upgrade pip
          arch -${{ matrix.arch }} $PY -m pip install -r requirements.txt pyobjc-framework-Cocoa pyobjc-framework-WebKit
      - name: Make .icns icon
        run: |
          mkdir -p vizo.iconset
          sips -z 16 16   logo_1024.png --out vizo.iconset/icon_16x16.png
          sips -z 32 32   logo_1024.png --out vizo.iconset/icon_16x16@2x.png
          sips -z 32 32   logo_1024.png --out vizo.iconset/icon_32x32.png
          sips -z 64 64   logo_1024.png --out vizo.iconset/icon_32x32@2x.png
          sips -z 128 128 logo_1024.png --out vizo.iconset/icon_128x128.png
          sips -z 256 256 logo_1024.png --out vizo.iconset/icon_128x128@2x.png
          sips -z 256 256 logo_1024.png --out vizo.iconset/icon_256x256.png
          sips -z 512 512 logo_1024.png --out vizo.iconset/icon_256x256@2x.png
          sips -z 512 512 logo_1024.png --out vizo.iconset/icon_512x512.png
          cp logo_1024.png vizo.iconset/icon_512x512@2x.png
          iconutil -c icns vizo.iconset -o vizo.icns
      - name: Build ${{ matrix.label }} (${{ matrix.arch }})
        run: |
          PY=/Library/Frameworks/Python.framework/Versions/3.13/bin/python3.13
          arch -${{ matrix.arch }} $PY -m PyInstaller --noconfirm --windowed --name vizo \
            --icon vizo.icns \
            --target-arch ${{ matrix.arch }} \
            --add-data "ui:ui" --add-data "prompts:prompts" \
            --collect-all playwright \
            --hidden-import webview.platforms.cocoa \
            app.py
      - name: Make .dmg (drag-to-Applications)
        run: |
          mkdir -p dmg_stage
          cp -R dist/vizo.app dmg_stage/
          ln -s /Applications dmg_stage/Applications
          hdiutil create -volname "vizo" -srcfolder dmg_stage -ov -format UDZO \
            "vizo-mac-${{ matrix.label }}.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: vizo-mac-${{ matrix.label }}
          path: vizo-mac-${{ matrix.label }}.dmg

  # ----------------------------------------------------------------
  # Publish all artifacts to the GitHub Release for the pushed tag.
  # ----------------------------------------------------------------
  release:
    needs: [windows, macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/vizo-windows/vizo.exe
            artifacts/vizo-mac-apple-silicon/vizo-mac-apple-silicon.dmg
            artifacts/vizo-mac-intel/vizo-mac-intel.dmg
          generate_release_notes: true
          fail_on_unmatched_files: false
